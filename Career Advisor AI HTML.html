<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Career Advisor AI</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;600;700&display=swap');

  :root {
    --bg: #f3f7f4;
    --surface: #ffffff;
    --surface2: #edf4ef;
    --border: #d4e6d8;
    --accent: #16a34a;
    --accent2: #059669;
    --green: #047857;
    --red: #dc2626;
    --yellow: #d97706;
    --text: #111d16;
    --muted: #6b7f70;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    padding: 0;
  }

  header {
    padding: 28px 40px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--surface);
  }
  .logo-icon {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  header h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  header span {
    font-size: 0.75rem;
    color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 3px 10px;
    border-radius: 20px;
    margin-left: auto;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 24px;
    display: grid;
    grid-template-columns: 400px 1fr;
    gap: 28px;
    align-items: start;
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
  }
  .panel-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 20px;
  }

  .tabs {
    display: flex;
    gap: 0;
    background: var(--surface2);
    border-radius: 8px;
    padding: 4px;
    margin-bottom: 20px;
  }
  .tab {
    flex: 1;
    padding: 8px;
    text-align: center;
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    border-radius: 6px;
    transition: all 0.2s;
  }
  .tab.active {
    background: var(--accent);
    color: #fff;
  }

  .skill-input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  input[type="text"], textarea {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 0.88rem;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border 0.2s;
    width: 100%;
  }
  input[type="text"]:focus, textarea:focus {
    border-color: var(--accent);
  }
  textarea { resize: vertical; min-height: 100px; }

  .tag-container {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    min-height: 44px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    margin-bottom: 16px;
  }
  .tag {
    background: linear-gradient(135deg, rgba(22,163,74,0.1), rgba(5,150,105,0.1));
    border: 1px solid rgba(22,163,74,0.35);
    color: var(--accent);
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 0.78rem;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .tag-remove {
    cursor: pointer;
    color: var(--muted);
    font-size: 0.9rem;
    line-height: 1;
  }
  .tag-remove:hover { color: var(--red); }

  .empty-tags {
    color: var(--muted);
    font-size: 0.8rem;
    margin: auto;
  }

  .suggest-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 20px;
  }
  .suggest-chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .suggest-chip:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .btn {
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    color: #fff;
    font-size: 0.9rem;
    font-weight: 600;
    border-radius: 8px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    font-family: 'Inter', sans-serif;
  }
  .btn:hover { opacity: 0.9; }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-sm {
    width: auto;
    padding: 9px 16px;
    font-size: 0.82rem;
    border-radius: 7px;
    flex-shrink: 0;
  }

  .or-divider {
    text-align: center;
    color: var(--muted);
    font-size: 0.75rem;
    margin: 16px 0;
    position: relative;
  }
  .or-divider::before, .or-divider::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 42%;
    height: 1px;
    background: var(--border);
  }
  .or-divider::before { left: 0; }
  .or-divider::after { right: 0; }

  .results-panel { display: flex; flex-direction: column; gap: 16px; }

  .placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 300px;
    gap: 12px;
    color: var(--muted);
    font-size: 0.88rem;
    text-align: center;
  }
  .placeholder-icon { font-size: 3rem; opacity: 0.4; }

  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px;
    transition: border-color 0.2s;
  }
  .result-card:hover { border-color: var(--accent); }
  .result-card.rank-1 { border-color: rgba(22,163,74,0.45); }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .card-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.05rem;
    font-weight: 700;
  }
  .rank-badge {
    font-size: 0.72rem;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
  }
  .rank-1 .rank-badge { background: rgba(22,163,74,0.12); color: var(--accent); }
  .rank-2 .rank-badge { background: rgba(5,150,105,0.1); color: var(--accent2); }
  .rank-3 .rank-badge { background: rgba(4,120,87,0.1); color: var(--green); }

  .match-bar-wrap { margin-bottom: 16px; }
  .match-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.78rem;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .match-label strong { color: var(--text); }
  .bar-track {
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.8s ease;
  }

  .skill-section { margin-bottom: 14px; }
  .skill-section-title {
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 8px;
  }
  .skill-section-title.green { color: var(--green); }
  .skill-section-title.red { color: var(--red); }

  .skill-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .skill-tag {
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 500;
  }
  .skill-tag.matched {
    background: rgba(4,120,87,0.1);
    border: 1px solid rgba(4,120,87,0.3);
    color: var(--green);
  }
  .skill-tag.missing {
    background: rgba(220,38,38,0.08);
    border: 1px solid rgba(220,38,38,0.25);
    color: var(--red);
  }
  .skill-tag.missing a {
    color: inherit;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .skill-tag.missing a:hover { text-decoration: underline; }

  .knn-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }
  .knn-card .panel-title { margin-bottom: 14px; }
  .knn-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }
  .knn-row:last-child { border-bottom: none; }
  .knn-rank { font-size: 0.75rem; color: var(--muted); width: 20px; }
  .knn-title { flex: 1; font-size: 0.85rem; font-weight: 500; }
  .knn-score { font-size: 0.8rem; color: var(--accent); font-weight: 600; }

  .extracted-notice {
    background: rgba(22,163,74,0.06);
    border: 1px solid rgba(22,163,74,0.2);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 16px;
  }
  .extracted-notice strong { color: var(--accent); }

  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 200px;
    gap: 10px;
    color: var(--muted);
    font-size: 0.88rem;
  }
  .spinner {
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    background: rgba(220,38,38,0.07);
    border: 1px solid rgba(220,38,38,0.25);
    color: var(--red);
    border-radius: 8px;
    padding: 14px;
    font-size: 0.85rem;
  }

  @media (max-width: 800px) {
    .container { grid-template-columns: 1fr; }
    header { padding: 20px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-icon">🧭</div>
  <h1>Career Advisor AI</h1>
  <span>TF-IDF · KNN · NLP</span>
</header>

<div class="container">

  <div>
    <div class="panel">
      <div class="panel-title">Your Profile</div>

      <div class="tabs">
        <div class="tab active" onclick="switchTab('skills')">Manual Skills</div>
        <div class="tab" onclick="switchTab('jd')">Job Description</div>
        <div class="tab" onclick="switchTab('both')">Both</div>
      </div>

      <div id="tab-skills">
        <div class="skill-input-row">
          <input type="text" id="skillInput" placeholder="Type a skill and press Enter or Add..." onkeydown="handleSkillKey(event)" />
          <button class="btn btn-sm" onclick="addSkill()">Add</button>
        </div>
        <div class="tag-container" id="tagContainer">
          <span class="empty-tags" id="emptyTags">No skills added yet</span>
        </div>

        <p class="panel-title" style="margin-bottom: 10px;">Quick Add</p>
        <div class="suggest-grid" id="suggestGrid"></div>
      </div>

      <div id="tab-jd" style="display:none;">
        <textarea id="jdInput" placeholder="Paste a job description here. Skills will be automatically extracted using NLP..."></textarea>
      </div>

      <div id="tab-both" style="display:none;">
        <div class="skill-input-row">
          <input type="text" id="skillInput2" placeholder="Type a skill..." onkeydown="handleSkillKey2(event)" />
          <button class="btn btn-sm" onclick="addSkill2()">Add</button>
        </div>
        <div class="tag-container" id="tagContainer2">
          <span class="empty-tags" id="emptyTags2">No skills added yet</span>
        </div>
        <div class="or-divider">+ job description</div>
        <textarea id="jdInput2" placeholder="Paste a job description..." style="margin-bottom:0;"></textarea>
      </div>

      <div style="margin-top: 20px;">
        <button class="btn" onclick="getRecommendations()" id="analyzeBtn">Analyze My Profile →</button>
      </div>
    </div>
  </div>

  <div class="results-panel" id="resultsPanel">
    <div class="placeholder">
      <div class="placeholder-icon">🎯</div>
      <div>Add your skills or paste a job description<br>to get AI-powered career recommendations.</div>
    </div>
  </div>

</div>

<script>
  let skills = [];
  let skills2 = [];
  let activeTab = 'skills';

  const SUGGEST_SKILLS = ["python", "javascript", "sql", "aws", "docker", "react",
    "machine learning", "deep learning", "git", "linux", "tensorflow", "kubernetes",
    "flask", "node", "java", "security", "cloud"];

  const sg = document.getElementById('suggestGrid');
  SUGGEST_SKILLS.forEach(s => {
    const chip = document.createElement('span');
    chip.className = 'suggest-chip';
    chip.textContent = s;
    chip.onclick = () => { addSkillToList(s, 'skills'); };
    sg.appendChild(chip);
  });

  function switchTab(tab) {
    activeTab = tab;
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', ['skills','jd','both'][i] === tab);
    });
    document.getElementById('tab-skills').style.display = tab === 'skills' ? '' : 'none';
    document.getElementById('tab-jd').style.display = tab === 'jd' ? '' : 'none';
    document.getElementById('tab-both').style.display = tab === 'both' ? '' : 'none';
  }

  function handleSkillKey(e) { if (e.key === 'Enter') addSkill(); }
  function handleSkillKey2(e) { if (e.key === 'Enter') addSkill2(); }

  function addSkill() {
    const val = document.getElementById('skillInput').value.trim().toLowerCase();
    if (val) { addSkillToList(val, 'skills'); document.getElementById('skillInput').value = ''; }
  }
  function addSkill2() {
    const val = document.getElementById('skillInput2').value.trim().toLowerCase();
    if (val) { addSkillToList(val, 'both'); document.getElementById('skillInput2').value = ''; }
  }

  function addSkillToList(val, list) {
    const arr = list === 'skills' ? skills : skills2;
    const containerId = list === 'skills' ? 'tagContainer' : 'tagContainer2';
    const emptyId = list === 'skills' ? 'emptyTags' : 'emptyTags2';
    if (!arr.includes(val)) {
      arr.push(val);
      renderTags(arr, containerId, emptyId, list);
    }
  }

  function removeSkill(val, list) {
    const arr = list === 'skills' ? skills : skills2;
    const containerId = list === 'skills' ? 'tagContainer' : 'tagContainer2';
    const emptyId = list === 'skills' ? 'emptyTags' : 'emptyTags2';
    const idx = arr.indexOf(val);
    if (idx > -1) arr.splice(idx, 1);
    renderTags(arr, containerId, emptyId, list);
  }

  function renderTags(arr, containerId, emptyId, list) {
    const container = document.getElementById(containerId);
    container.innerHTML = '';
    if (arr.length === 0) {
      container.innerHTML = `<span class="empty-tags" id="${emptyId}">No skills added yet</span>`;
      return;
    }
    arr.forEach(s => {
      const tag = document.createElement('span');
      tag.className = 'tag';
      tag.innerHTML = `${s} <span class="tag-remove" onclick="removeSkill('${s}','${list}')">×</span>`;
      container.appendChild(tag);
    });
  }

  async function getRecommendations() {
    const btn = document.getElementById('analyzeBtn');
    btn.disabled = true;

    let manualSkills = [];
    let jd = '';

    if (activeTab === 'skills') manualSkills = [...skills];
    else if (activeTab === 'jd') jd = document.getElementById('jdInput').value.trim();
    else { manualSkills = [...skills2]; jd = document.getElementById('jdInput2').value.trim(); }

    if (manualSkills.length === 0 && jd.length < 10) {
      showError('Please add at least 2 skills or paste a job description.');
      btn.disabled = false;
      return;
    }

    showLoading();

    try {
      const res = await fetch('/recommend', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ skills: manualSkills, job_description: jd, top_n: 3 })
      });
      const data = await res.json();
      if (data.error) { showError(data.error); }
      else { renderResults(data); }
    } catch (e) {
      showError('Could not connect to server. Make sure the Flask app is running.');
    }

    btn.disabled = false;
  }

  function showLoading() {
    document.getElementById('resultsPanel').innerHTML = `
      <div class="loading"><div class="spinner"></div> Analyzing your profile...</div>`;
  }

  function showError(msg) {
    document.getElementById('resultsPanel').innerHTML = `<div class="error-msg">⚠️ ${msg}</div>`;
  }

  function renderResults(data) {
    let html = '';

    if (data.extracted_from_jd && data.extracted_from_jd.length > 0) {
      html += `<div class="extracted-notice">
        🔍 Extracted <strong>${data.extracted_from_jd.length} skills</strong> from job description: 
        ${data.extracted_from_jd.map(s => `<strong>${s}</strong>`).join(', ')}
      </div>`;
    }

    const ranks = ['#1 Best Match', '#2 Strong Match', '#3 Good Match'];
    data.recommendations.forEach((rec, i) => {
      const missingLinks = Object.entries(rec.learning || {}).map(([skill, url]) =>
        `<span class="skill-tag missing"><a href="${url}" target="_blank">📚 ${skill}</a></span>`
      ).join('');

      const missingNoLink = (rec.missing_skills || [])
        .filter(s => !rec.learning[s])
        .map(s => `<span class="skill-tag missing">${s}</span>`).join('');

      html += `
        <div class="result-card rank-${i+1}">
          <div class="card-header">
            <div class="card-title">${rec.title}</div>
            <span class="rank-badge">${ranks[i]}</span>
          </div>
          <div class="match-bar-wrap">
            <div class="match-label"><span>Match Score</span><strong>${rec.match_percent}%</strong></div>
            <div class="bar-track"><div class="bar-fill" style="width:${Math.min(rec.match_percent,100)}%"></div></div>
          </div>
          ${rec.matched_skills.length > 0 ? `
          <div class="skill-section">
            <div class="skill-section-title green">✓ Skills You Have (${rec.matched_skills.length})</div>
            <div class="skill-tags">${rec.matched_skills.map(s => `<span class="skill-tag matched">${s}</span>`).join('')}</div>
          </div>` : ''}
          ${rec.missing_skills.length > 0 ? `
          <div class="skill-section">
            <div class="skill-section-title red">✗ Skill Gaps — Learn These (${rec.missing_skills.length})</div>
            <div class="skill-tags">${missingLinks}${missingNoLink}</div>
          </div>` : ''}
        </div>`;
    });

    html += `
      <div class="knn-card">
        <div class="panel-title">🤖 KNN Classification — Profile Type</div>
        ${data.knn_classification.map((k, i) => `
          <div class="knn-row">
            <span class="knn-rank">#${i+1}</span>
            <span class="knn-title">${k.title}</span>
            <span class="knn-score">${Math.round(k.similarity * 100)}% similar</span>
          </div>`).join('')}
      </div>`;

    document.getElementById('resultsPanel').innerHTML = html;

    setTimeout(() => {
      document.querySelectorAll('.bar-fill').forEach(b => {
        const w = b.style.width;
        b.style.width = '0%';
        setTimeout(() => b.style.width = w, 50);
      });
    }, 50);
  }
</script>
</body>
</html>
